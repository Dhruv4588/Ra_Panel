services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    command: mongod --auth
    networks:
      - app-network

  backend:
    image: node:20-alpine
    container_name: backend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules     # ← Fix: Use named volume
    working_dir: /app
    command: sh -c "npm ci && npm run start"  # ← Fix: Remove --only=production for dev
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/myapp?authSource=admin
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
  node_modules:         # ← Add named volume
